<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeDNA 命盤匯入工具</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        .import-container {
            max-width: 600px;
            margin: 4rem auto;
            text-align: center;
            padding: 2rem;
        }
        input[type="url"] {
            width: 100%;
            padding: 1rem;
            margin: 1.5rem 0;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1.1rem;
        }
        input[type="url"]:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn-large {
            padding: 1rem 2rem;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .btn-large:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(234, 179, 8, 0.3);
        }
        .btn-large:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        #status {
            margin-top: 1.5rem;
            font-size: 1rem;
            color: var(--accent);
            min-height: 1.5rem;
        }
        .result-box {
            margin-top: 2rem;
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 8px;
            text-align: left;
            display: none;
        }
        .result-box pre {
            color: #10b981;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <header class="animate-fade">
        <h1>LifeDNA 命盤匯入工具</h1>
        <p class="subtitle">自動抓取排盤資料並轉跳至紫微斗數系統</p>
    </header>

    <main class="animate-fade" style="animation-delay: 0.2s;">
        <div class="import-container glass card">
            <h2>輸入 LifeDNA 命盤網址</h2>
            <p style="font-size: 0.9rem; color: var(--text-dim); margin-top: 0.5rem;">
                請貼上您在 LifeDNA 排盤後的結果網址（需包含 result.php?s=...）
            </p>
            
            <input type="url" id="lifedna_url" placeholder="https://www.lifedna.com.tw/t/map/f/result.php?s=..." required>
            
            <div style="display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; justify-content: center;">
                <button id="importBtn1" class="btn-large" onclick="handleImport('fstarpro')" style="flex: 1; min-width: 150px;">匯入至 FStarPro</button>
                <button id="importBtn2" class="btn-large" onclick="handleImport('yourpower')" style="background: linear-gradient(135deg, #10b981, #059669); color: white; flex: 1; min-width: 150px;">匯入至 YourPower</button>
                <button id="importBtn3" class="btn-large" onclick="handleImport('nan')" style="background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; flex: 1; min-width: 150px;">匯入至 邏輯思維</button>
            </div>
            
            <div id="status"></div>

            <div id="resultBox" class="result-box">
                <h3 style="margin-bottom: 0.5rem; color: var(--text);">提取結果：</h3>
                <pre id="resultData"></pre>
                <div style="margin-top: 1rem; text-align: center;">
                    <a id="redirectLink" href="#" style="color: var(--accent); text-decoration: underline;">點擊此處手動跳轉</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        // LifeDNA td index -> 地支 對照表 (td0=子, td1=丑, ... td11=亥)
        // LifeDNA 的 td0-td11 就是地支順序: 子丑寅卯辰巳午未申酉戌亥
        const lifedna_branchMap = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];

        function extractData(doc) {
            let result = {};

            // 解析西元生日
            const bodyText = doc.body.textContent;
            const dateMatch = bodyText.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})\s+(\d{1,2}):(\d{1,2})/);
            if (dateMatch) {
                result.birthDate = `${dateMatch[1]}-${dateMatch[2].padStart(2,'0')}-${dateMatch[3].padStart(2,'0')}`;
                result.birthTime = `${dateMatch[4].padStart(2,'0')}:${dateMatch[5].padStart(2,'0')}`;
            }

            // 解析性別
            const uData = doc.querySelector('.u_data_u');
            if (uData) {
                const t = uData.textContent;
                if (t.includes('男')) result.gender = '1';
                else if (t.includes('女')) result.gender = '0';
            }

            const html = doc.documentElement.innerHTML;

            // LifeDNA 的 chc(ziwei, _, ming, ...) 函數中:
            // 第1個參數 = 紫微星所在的 td index
            // 第3個參數 = 命宮所在的 td index
            // 所有宮格的 chc() 呼叫完全相同，取任一個即可
            const chcMatch = html.match(/onMouseOver="chc\('(\d+)','(\d+)','(\d+)'/);
            if (chcMatch) {
                const zIdx = parseInt(chcMatch[1], 10);
                const mIdx = parseInt(chcMatch[3], 10);
                result.ziwei = lifedna_branchMap[zIdx];
                result.ming  = lifedna_branchMap[mIdx];
            }

            // yin (寅宮天干)
            const td2 = doc.getElementById('td2');
            if (td2) {
                const upTds = td2.querySelectorAll('td.up');
                for (let td of upTds) {
                    const text = td.textContent.trim();
                    if (text.length === 2) { result.yin = text.charAt(0); break; }
                }
            }

            return result;
        }

        async function handleImport(targetSystem) {
            const urlInput = document.getElementById("lifedna_url").value.trim();
            const btn1 = document.getElementById("importBtn1");
            const btn2 = document.getElementById("importBtn2");
            const btn3 = document.getElementById("importBtn3");
            const status = document.getElementById("status");
            const resultBox = document.getElementById("resultBox");
            const resultData = document.getElementById("resultData");
            const redirectLink = document.getElementById("redirectLink");

            if (!urlInput) {
                status.textContent = "請輸入網址！";
                return;
            }

            try {
                btn1.disabled = true;
                btn2.disabled = true;
                btn3.disabled = true;
                status.textContent = "🔄 正在透過 Proxy 抓取資料，請稍候...";
                resultBox.style.display = "none";

                // 使用 CodeTabs CORS proxy 來繞過 CORS 限制抓取 HTML
                const proxyUrl = "https://api.codetabs.com/v1/proxy/?quest=";
                const response = await fetch(proxyUrl + encodeURIComponent(urlInput));
                
                if (!response.ok) {
                    throw new Error("網路請求失敗，狀態碼：" + response.status);
                }

                // 嘗試先用 UTF-8 解碼，若出現亂碼則改用 Big5
                const buffer = await response.arrayBuffer();
                let html = new TextDecoder('utf-8').decode(buffer);
                if (html.includes('\uFFFD')) {
                    html = new TextDecoder('big5').decode(buffer);
                }

                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const data = extractData(doc);
                
                // 檢查是否成功抓取關鍵資料
                if (!data.ming || !data.ziwei) {
                    throw new Error("無法解析命盤內容，請確認網址是否正確或為有效排盤。");
                }

                status.textContent = "✅ 抓取成功！準備跳轉...";
                
                // 顯示結果 (供除錯與觀看)
                resultData.textContent = JSON.stringify(data, null, 2);
                resultBox.style.display = "block";

                // 移除 undefined 或 null 的參數
                const validData = {};
                for (const key in data) {
                    if (data[key]) validData[key] = data[key];
                }

                // 組合跳轉網址
                const params = new URLSearchParams(validData);
                let baseUrl = "https://pcmnking.github.io/fstarpro/";
                if (targetSystem === 'yourpower') {
                    baseUrl = "https://pcmnking.github.io/yourpower/";
                } else if (targetSystem === 'nan') {
                    baseUrl = "https://pcmnking.github.io/nan/";
                }
                const targetUrl = baseUrl + "?" + params.toString();
                
                redirectLink.href = targetUrl;
                redirectLink.textContent = targetUrl;

                // 自動跳轉
                window.location.href = targetUrl;

            } catch (err) {
                console.error(err);
                status.textContent = "❌ 發生錯誤：" + err.message;
            } finally {
                btn1.disabled = false;
                btn2.disabled = false;
                btn3.disabled = false;
            }
        }
    </script>
</body>
</html>
